<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Machine Base -->
  <rect id="machine-base" x="100" y="400" width="600" height="150" fill="#e9ecef" stroke="#6c757d" stroke-width="2"/>
  <text x="400" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#495057">Machine Base</text>
  
  <!-- Main Assembly -->
  <rect id="main-assembly" x="200" y="250" width="400" height="150" fill="#dee2e6" stroke="#495057" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-family="Arial" font-size="14" fill="#495057">Main Assembly</text>
  
  <!-- Motor -->
  <circle id="motor" cx="300" cy="200" r="40" fill="#ffc107" stroke="#fd7e14" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#495057">Motor</text>
  
  <!-- Gearbox -->
  <rect id="gearbox" x="380" y="160" width="80" height="80" fill="#28a745" stroke="#20c997" stroke-width="2"/>
  <text x="420" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">Gearbox</text>
  
  <!-- Spindle -->
  <rect id="spindle" x="500" y="180" width="120" height="40" fill="#dc3545" stroke="#e83e8c" stroke-width="2"/>
  <text x="560" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">Spindle</text>
  
  <!-- Control Panel -->
  <rect id="control-panel" x="50" y="100" width="120" height="200" fill="#6f42c1" stroke="#6610f2" stroke-width="2"/>
  <text x="110" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">Control Panel</text>
  
  <!-- Hydraulic System -->
  <rect id="hydraulic-system" x="650" y="150" width="100" height="100" fill="#17a2b8" stroke="#20c997" stroke-width="2"/>
  <text x="700" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">Hydraulic</text>
  
  <!-- Cooling System -->
  <circle id="cooling-system" cx="150" cy="350" r="30" fill="#6c757d" stroke="#495057" stroke-width="2"/>
  <text x="150" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Cooling</text>
  
  <!-- Electrical Cabinet -->
  <rect id="electrical-cabinet" x="650" y="300" width="100" height="120" fill="#fd7e14" stroke="#dc3545" stroke-width="2"/>
  <text x="700" y="365" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">Electrical</text>
  
  <!-- Connection Lines -->
  <line x1="340" y1="200" x2="380" y2="200" stroke="#6c757d" stroke-width="3"/>
  <line x1="460" y1="200" x2="500" y2="200" stroke="#6c757d" stroke-width="3"/>
  <line x1="170" y1="200" x2="260" y2="200" stroke="#6c757d" stroke-width="3"/>
  <line x1="700" y1="250" x2="700" y2="300" stroke="#6c757d" stroke-width="3"/>
  
  <!-- Hotspot Indicators (normally invisible, shown for demo) -->
  <circle cx="300" cy="200" r="5" fill="red" opacity="0.7"/>
  <circle cx="420" cy="200" r="5" fill="red" opacity="0.7"/>
  <circle cx="560" cy="200" r="5" fill="red" opacity="0.7"/>
  <circle cx="110" cy="200" r="5" fill="red" opacity="0.7"/>
  <circle cx="700" cy="200" r="5" fill="red" opacity="0.7"/>
  <circle cx="150" cy="350" r="5" fill="red" opacity="0.7"/>
  <circle cx="700" cy="360" r="5" fill="red" opacity="0.7"/>
</svg>