<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8"/>
  
  <!-- Machine Base -->
  <rect x="100" y="450" width="600" height="80" fill="#2c3e50" stroke="#1a252f" stroke-width="3"/>
  <rect x="120" y="470" width="560" height="40" fill="#34495e"/>
  
  <!-- Main Frame -->
  <rect x="150" y="200" width="500" height="250" fill="#7f8c8d" stroke="#5a6c7d" stroke-width="3"/>
  <rect x="160" y="210" width="480" height="230" fill="#95a5a6"/>
  
  <!-- Fabric Entry Section -->
  <rect x="100" y="250" width="80" height="150" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="140" y="330" font-size="12" fill="white" text-anchor="middle" font-weight="bold">ENTRY</text>
  <circle cx="140" cy="280" r="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Singeing Burner Assembly -->
  <g id="burner-assembly">
    <!-- Burner Housing -->
    <rect x="250" y="240" width="120" height="80" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <rect x="260" y="250" width="100" height="60" fill="#e67e22"/>
    
    <!-- Flame Indicators -->
    <path d="M 280 270 Q 285 260 290 270 Q 295 260 300 270 Q 305 260 310 270" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M 285 275 Q 290 265 295 275 Q 300 265 305 275 Q 310 265 315 275" fill="none" stroke="#f1c40f" stroke-width="2"/>
    <path d="M 290 280 Q 295 270 300 280 Q 305 270 310 280" fill="none" stroke="#fff" stroke-width="1"/>
    
    <!-- Gas Supply Line -->
    <rect x="250" y="330" width="60" height="15" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <circle cx="280" cy="337" r="8" fill="#e74c3c"/>
    <text x="310" y="342" font-size="10" fill="#2c3e50" font-weight="bold">GAS</text>
  </g>
  
  <!-- Desizing Chemical Tank -->
  <g id="desizing-tank">
    <ellipse cx="480" cy="240" rx="60" ry="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <rect x="420" y="240" width="120" height="100" fill="#5dade2" stroke="#2980b9" stroke-width="2"/>
    <ellipse cx="480" cy="340" rx="60" ry="40" fill="#2980b9" stroke="#21618c" stroke-width="2"/>
    
    <!-- Liquid Level -->
    <rect x="425" y="280" width="110" height="50" fill="#1abc9c" opacity="0.6"/>
    <text x="480" y="310" font-size="12" fill="white" text-anchor="middle" font-weight="bold">CHEMICAL</text>
    
    <!-- Valve -->
    <circle cx="480" cy="360" r="12" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <line x1="480" y1="372" x2="480" y2="400" stroke="#7f8c8d" stroke-width="4"/>
  </g>
  
  <!-- Spray Nozzles -->
  <g id="spray-nozzles">
    <rect x="450" y="380" width="15" height="30" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <rect x="480" y="380" width="15" height="30" fill="#95a5a6" stroke="#7f8c8d" stroke-1"/>
    <rect x="510" y="380" width="15" height="30" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    
    <!-- Spray Pattern -->
    <path d="M 457 410 L 450 425 L 464 425 Z" fill="#1abc9c" opacity="0.5"/>
    <path d="M 487 410 L 480 425 L 494 425 Z" fill="#1abc9c" opacity="0.5"/>
    <path d="M 517 410 L 510 425 L 524 425 Z" fill="#1abc9c" opacity="0.5"/>
  </g>
  
  <!-- Fabric Path -->
  <path d="M 180 325 L 240 325 L 370 300 L 500 325 L 640 325" 
        fill="none" stroke="#ecf0f1" stroke-width="8" stroke-dasharray="10,5"/>
  
  <!-- Guide Rollers -->
  <circle cx="240" cy="325" r="20" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  <circle cx="370" cy="300" r="20" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  <circle cx="500" cy="325" r="20" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  <circle cx="640" cy="325" r="20" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  
  <!-- Cooling Section -->
  <rect x="580" y="260" width="100" height="120" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="630" y="325" font-size="12" fill="white" text-anchor="middle" font-weight="bold">COOLING</text>
  
  <!-- Cooling Fans -->
  <circle cx="610" cy="290" r="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="610" y1="280" x2="610" y2="300" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="600" y1="290" x2="620" y2="290" stroke="#7f8c8d" stroke-width="2"/>
  
  <circle cx="650" cy="290" r="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="650" y1="280" x2="650" y2="300" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="640" y1="290" x2="660" y2="290" stroke="#7f8c8d" stroke-width="2"/>
  
  <!-- Fabric Exit Section -->
  <rect x="720" y="250" width="80" height="150" fill="#27ae60" stroke="#229954" stroke-width="2"/>
  <text x="760" y="330" font-size="12" fill="white" text-anchor="middle" font-weight="bold">EXIT</text>
  <circle cx="760" cy="360" r="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Control Panel -->
  <rect x="200" y="150" width="120" height="40" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="230" cy="170" r="8" fill="#e74c3c"/>
  <circle cx="260" cy="170" r="8" fill="#f39c12"/>
  <circle cx="290" cy="170" r="8" fill="#2ecc71"/>
  <text x="260" y="135" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">CONTROL PANEL</text>
  
  <!-- Temperature Gauge -->
  <circle cx="550" cy="170" r="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="3"/>
  <path d="M 550 170 L 565 160" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <text x="550" y="210" font-size="10" fill="#2c3e50" text-anchor="middle">TEMP °C</text>
  
  <!-- Speed Control -->
  <rect x="620" y="150" width="60" height="40" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <rect x="630" y="160" width="40" height="8" fill="#2ecc71"/>
  <text x="650" y="185" font-size="10" fill="white" text-anchor="middle">SPEED</text>
  
  <!-- Machine Labels -->
  <text x="400" y="50" font-size="24" fill="#2c3e50" text-anchor="middle" font-weight="bold">SINGEING DESIZING MACHINE</text>
  <text x="400" y="75" font-size="14" fill="#7f8c8d" text-anchor="middle">Model: SDM-2000 | Capacity: 200 m/min</text>
  
  <!-- Component Labels -->
  <text x="310" y="230" font-size="11" fill="#2c3e50" font-weight="bold">Burner Assembly</text>
  <text x="480" y="230" font-size="11" fill="#2c3e50" font-weight="bold">Chemical Tank</text>
  <text x="630" y="250" font-size="11" fill="#2c3e50" font-weight="bold">Cooling Unit</text>
  
  <!-- Safety Indicators -->
  <rect x="50" y="100" width="100" height="60" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="100" y="120" font-size="10" fill="#e74c3c" text-anchor="middle" font-weight="bold">⚠ SAFETY</text>
  <text x="100" y="135" font-size="9" fill="#2c3e50" text-anchor="middle">Fire Suppression</text>
  <text x="100" y="150" font-size="9" fill="#2c3e50" text-anchor="middle">Emergency Stop</text>
  
  <!-- Maintenance Access Points -->
  <rect x="160" y="420" width="30" height="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="175" y="435" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">M1</text>
  
  <rect x="360" y="420" width="30" height="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="435" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">M2</text>
  
  <rect x="610" y="420" width="30" height="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="625" y="435" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">M3</text>
</svg>
