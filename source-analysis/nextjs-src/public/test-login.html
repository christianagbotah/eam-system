<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Login Test</h1>
    <button onclick="testLogin('admin', 'admin123')">Test Admin</button>
    <button onclick="testLogin('operator1', 'password')">Test Operator1</button>
    <button onclick="testLogin('manager1', 'password')">Test Manager1</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <div id="results"></div>
    
    <script>
        async function testLogin(username, password) {
            const results = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = 'test';
            testDiv.innerHTML = `<h3>Testing: ${username}</h3><p>Loading...</p>`;
            results.insertBefore(testDiv, results.firstChild);
            
            try {
                // Clear storage first
                localStorage.clear();
                
                const url = 'http://localhost/factorymanager/public/index.php/api/v1/eam/auth/login';
                console.log('Fetching:', url);
                console.log('Credentials:', { username, password });
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.status === 200 && data.status === 'success') {
                    testDiv.className = 'test success';
                    testDiv.innerHTML = `
                        <h3>✓ ${username} - SUCCESS</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>User ID:</strong> ${data.data.user.id}</p>
                        <p><strong>Role:</strong> ${data.data.user.role}</p>
                        <p><strong>Token:</strong> ${data.data.tokens.access_token.substring(0, 50)}...</p>
                        <p><strong>Saved to localStorage:</strong> ${localStorage.getItem('token') ? 'Yes' : 'No'}</p>
                    `;
                    
                    // Save to localStorage
                    localStorage.setItem('token', data.data.tokens.access_token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                } else {
                    testDiv.className = 'test error';
                    testDiv.innerHTML = `
                        <h3>✗ ${username} - FAILED</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Message:</strong> ${data.message || 'Unknown error'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                testDiv.className = 'test error';
                testDiv.innerHTML = `
                    <h3>✗ ${username} - ERROR</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
                console.error('Error:', error);
            }
        }
        
        function clearStorage() {
            localStorage.clear();
            alert('LocalStorage cleared!');
        }
    </script>
</body>
</html>
